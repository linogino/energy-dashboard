name: Update Dashboard Data

on:
  # 毎日 朝9時(JST) = UTC 0時に実行
  schedule:
    - cron: '0 0 * * *'
  # 手動トリガー
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt
          pip install -r scripts/requirements_iip.txt

      - name: Fetch energy dashboard data
        run: python scripts/fetch_data.py

      - name: Fetch IIP data
        run: python scripts/fetch_iip.py --out iip.html

      - name: Fetch news
        run: python scripts/fetch_news.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/dashboard.json data/iip.json data/news.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json data/iip.json data/news.json iip.html
          git commit -m "chore: update dashboard + IIP + news $(date +'%Y-%m-%d')"
          git push
